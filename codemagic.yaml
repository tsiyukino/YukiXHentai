workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: com.yukixhentai.app

    scripts:
      - name: Install Rust stable + iOS targets
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install Tauri CLI
        script: |
          source $HOME/.cargo/env
          cargo install tauri-cli --version "^2" --locked

      - name: Install Node deps
        script: npm install --force

      - name: Install CocoaPods deps
        script: |
          cd src-tauri/gen/apple
          pod install

      - name: Build and package IPA (unsigned, for AltStore)
        script: |
          source $HOME/.cargo/env
          export PATH="$HOME/.cargo/bin:$PATH"

          # cargo tauri ios build will fail at export (no signing team) but
          # the .app will already be built in DerivedData before that point.
          cargo tauri ios build --export-method debugging 2>&1 | tee /tmp/tauri-build.log || true

          # Find the .app inside the .xcarchive (persists after failed export)
          ARCHIVE_PATH=$(find ~/Library/Developer/Xcode/Archives -name "*.xcarchive" 2>/dev/null | head -1)
          echo "Archive: $ARCHIVE_PATH"
          APP_PATH=$(find "$ARCHIVE_PATH/Products" -name "*.app" 2>/dev/null | grep -v "\.xctest" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: could not find .app bundle in archive"
            find ~/Library/Developer/Xcode/Archives -name "*.app" 2>/dev/null || true
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r YukiXHentai.ipa Payload
          mkdir -p "$CM_BUILD_DIR/output"
          cp YukiXHentai.ipa "$CM_BUILD_DIR/output/"
          echo "IPA created at $CM_BUILD_DIR/output/YukiXHentai.ipa"

    artifacts:
      - output/*.ipa

    publishing:
      email:
        recipients:
          - tsiyukino@gmail.com
        notify:
          success: true
          failure: true
