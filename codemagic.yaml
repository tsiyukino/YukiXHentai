workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: com.yukixhentai.app

    scripts:
      - name: Install Rust stable + iOS targets
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install Tauri CLI
        script: |
          source $HOME/.cargo/env
          cargo install tauri-cli --version "^2" --locked

      - name: Install Node deps
        script: npm install --force

      - name: Install CocoaPods deps
        script: |
          cd src-tauri/gen/apple
          pod install

      - name: Build and package IPA (unsigned, for AltStore)
        script: |
          source $HOME/.cargo/env
          export PATH="$HOME/.cargo/bin:$PATH"

          # Build via tauri (compiles Rust + runs xcodebuild archive)
          # Use || true to allow build to succeed even if export fails
          cargo tauri ios build --export-method ad-hoc 2>&1 | tee /tmp/tauri-build.log || true

          # Find the .app from the archive or derived data
          APP_PATH=$(find src-tauri/gen/apple/build -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/release-iphoneos/*.app" 2>/dev/null | grep -v ".xctest" | head -1)
          fi

          echo "Found app at: $APP_PATH"
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r YukiXHentai.ipa Payload
          mkdir -p $CM_BUILD_DIR/output
          cp YukiXHentai.ipa $CM_BUILD_DIR/output/
          echo "IPA created at $CM_BUILD_DIR/output/YukiXHentai.ipa"

    artifacts:
      - output/*.ipa

    publishing:
      email:
        recipients:
          - tsiyukino@gmail.com
        notify:
          success: true
          failure: true
