workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: com.yukixhentai.app

    scripts:
      - name: Install Rust stable + iOS targets
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install Tauri CLI
        script: |
          source $HOME/.cargo/env
          cargo install tauri-cli --version "^2" --locked

      - name: Install Node deps
        script: npm install --force

      - name: Install CocoaPods deps
        script: |
          cd src-tauri/gen/apple
          pod install

      - name: Build and package IPA (unsigned, for AltStore)
        script: |
          source $HOME/.cargo/env
          export PATH="$HOME/.cargo/bin:$PATH"

          # cargo tauri ios build will fail at export (no signing team) but
          # the .app will already be built in DerivedData before that point.
          cargo tauri ios build --export-method debugging 2>&1 | tee /tmp/tauri-build.log || true

          # The .xcarchive is at src-tauri/gen/apple/build/*_iOS.xcarchive
          ARCHIVE_PATH=$(find src-tauri/gen/apple/build -name "*.xcarchive" 2>/dev/null | head -1)
          echo "Archive: $ARCHIVE_PATH"

          if [ -z "$ARCHIVE_PATH" ]; then
            echo "ERROR: no .xcarchive found"
            ls src-tauri/gen/apple/build/ || true
            exit 1
          fi

          # An IPA is just a zip of Payload/<App>.app
          cp -r "$ARCHIVE_PATH/Products/Applications" /tmp/Payload
          cd /tmp
          zip -r YukiXHentai.ipa Payload
          mkdir -p "$CM_BUILD_DIR/output"
          cp YukiXHentai.ipa "$CM_BUILD_DIR/output/"
          echo "IPA created at $CM_BUILD_DIR/output/YukiXHentai.ipa"

    artifacts:
      - output/*.ipa

    publishing:
      email:
        recipients:
          - tsiyukino@gmail.com
        notify:
          success: true
          failure: true
