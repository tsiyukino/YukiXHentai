workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: com.yukixhentai.app

    scripts:
      - name: Install Rust stable + iOS targets
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install Tauri CLI
        script: |
          source $HOME/.cargo/env
          cargo install tauri-cli --version "^2" --locked

      - name: Install Node deps
        script: npm install --force

      - name: Install CocoaPods deps
        script: |
          cd src-tauri/gen/apple
          pod install

      - name: Build app (unsigned)
        script: |
          source $HOME/.cargo/env
          export PATH="$HOME/.cargo/bin:$PATH"
          xcodebuild \
            -workspace src-tauri/gen/apple/yukixhentai.xcworkspace \
            -scheme yukixhentai_iOS \
            -sdk iphoneos \
            -configuration release \
            -derivedDataPath /tmp/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        script: |
          APP_PATH=$(find /tmp/derived/Build/Products/release-iphoneos -name "*.app" | head -1)
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r YukiXHentai.ipa Payload
          mkdir -p $CM_BUILD_DIR/output
          cp YukiXHentai.ipa $CM_BUILD_DIR/output/

    artifacts:
      - output/*.ipa

    publishing:
      email:
        recipients:
          - tsiyukino@gmail.com
        notify:
          success: true
          failure: true
