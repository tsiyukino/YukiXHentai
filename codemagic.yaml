workflows:
  ios-build:
    name: iOS IPA Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: com.yukixhentai.app

    scripts:
      - name: Install Rust stable + iOS targets
        script: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install Tauri CLI
        script: |
          source $HOME/.cargo/env
          cargo install tauri-cli --version "^2" --locked

      - name: Install Node deps
        script: npm install --force

      - name: Install CocoaPods deps
        script: |
          cd src-tauri/gen/apple
          pod install

      - name: Build IPA (unsigned, for AltStore sideloading)
        script: |
          source $HOME/.cargo/env
          cargo tauri ios build --export-method debugging CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

    artifacts:
      - src-tauri/gen/apple/build/arm64/*.ipa

    publishing:
      email:
        recipients:
          - tsiyukino@gmail.com
        notify:
          success: true
          failure: true
