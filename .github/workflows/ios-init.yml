name: iOS Init (run once)
# Run this manually once to scaffold the Xcode project.
# It commits src-tauri/gen/apple/ back to the repo.
# After that, this workflow is no longer needed.
on:
  workflow_dispatch:

jobs:
  ios-init:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-ios-init-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ios-init-

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Run tauri ios init
        run: cargo tauri ios init
        working-directory: ${{ github.workspace }}

      - name: Commit gen/apple back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/gen/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: scaffold Xcode project (tauri ios init)"
          git push
